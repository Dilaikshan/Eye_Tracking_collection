name: eye_tracking_collection
description: Eye tracking data collection app for research
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Material Design
  cupertino_icons: ^1.0.6

  # Camera & Permissions
  camera: ^0.11.2+1
  permission_handler: ^12.0.1

  # Google ML Kit - Face Detection & Mesh
  google_mlkit_face_detection: ^0.13.0
  google_mlkit_face_mesh_detection: ^0.4.0
  google_mlkit_commons: ^0.11.0

  # Firebase & Firestore
  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10
  firebase_auth: ^5.7.0

  # Azure Integration
  http: ^1.6.0
  flutter_dotenv: ^6.0.0

  # Image Processing
  image: ^4.7.2

  # Voice & Haptics
  flutter_tts: ^4.2.5
  vibration: ^3.1.5

  # State Management
  provider: ^6.1.5+1

  # Utilities
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  uuid: ^4.5.2
  device_info_plus: ^12.3.0
  flutter_lints: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
